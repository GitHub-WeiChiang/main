<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>問答系統</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <style>
        body { padding: 20px; }
        
        /* 聊天視窗 */
        #chat-box {
            width: 100%;
            height: 400px;
            border: 1px solid #ccc;
            overflow-y: auto;
            padding: 15px;
            background: linear-gradient(to bottom, #f9f9f9, #e9ecef);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
        }
        
        .message {
            max-width: 75%;
            padding: 12px;
            margin: 8px;
            border-radius: 18px;
            display: inline-block;
            word-wrap: break-word;
            font-size: 16px;
        }

        .user-message {
            align-self: flex-end;
            background: #007bff;
            color: white;
            border-bottom-right-radius: 5px;
        }

        .bot-message {
            align-self: flex-start;
            background: #e3e3e3;
            color: black;
            border-bottom-left-radius: 5px;
        }

        .error-message {
            background: #ff4d4d;
            color: white;
        }

        /* 控制面板區塊 */
        .control-panel {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
        }

        /* Temperature 數值標籤 */
        #temp-value {
            display: inline-block;
            width: 50px;
            text-align: center;
            font-weight: bold;
            margin-left: 10px;
            padding: 5px;
            background: #ddd;
            border-radius: 5px;
        }

        /* 燈號顯示 */
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 18px;
            font-weight: bold;
        }

        .status-light {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            display: inline-block;
            transition: background 0.5s ease, box-shadow 0.5s ease;
        }

        .status-on {
            background: #28a745;
            box-shadow: 0 0 15px rgba(40, 167, 69, 0.8);
        }

        .status-off {
            background: #dc3545;
            box-shadow: 0 0 15px rgba(220, 53, 69, 0.8);
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>問答系統</h2>

        <!-- 聊天視窗 -->
        <div id="chat-box" class="mb-3">
            <div id="loading" class="text-center text-muted" style="display: none;">載入中...</div>
        </div>

        <!-- 使用者輸入 -->
        <div class="input-group mb-3">
            <input type="text" id="user-input" class="form-control" placeholder="輸入你的問題">
            <button class="btn btn-primary" onclick="sendMessage()">發送</button>
        </div>

        <!-- 燈號顯示 -->
        <div class="status-indicator">
            <span>系統狀態：</span>
            <span id="status-light" class="status-light status-on"></span>
            <span id="status-text">運行中</span>
        </div>

        <!-- 控制面板 -->
        <div class="control-panel">
            <h5 class="mb-3">參數設定</h5>

            <div class="card p-3 mb-3">
                <label for="top-k" class="form-label">Top-K：</label>
                <input type="number" id="top-k" class="form-control" value="5" min="1" max="100">
            </div>

            <div class="card p-3">
                <label for="temperature" class="form-label">Temperature：</label>
                <input type="range" id="temperature" class="form-range" min="0" max="1" step="0.1" value="0.7">
                <span id="temp-value" class="badge bg-secondary px-3 py-2">0.7</span>
            </div>
        </div>

    </div>

    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
